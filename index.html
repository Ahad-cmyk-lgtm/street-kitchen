<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Call Centre Productivity Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2b;
    --border: #252a38;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #6c63ff;
    --warn: #ffb800;
    --danger: #ff3b3b;
    --text: #e8eaf0;
    --text2: #8891a8;
    --text3: #4a5568;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* LOGIN */
  #loginScreen {
    position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:1000;
  }
  .login-box {
    background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:48px 40px; width:380px;
    box-shadow:0 0 60px rgba(0,229,160,0.07);
  }
  .login-logo { font-size:28px; font-weight:800; letter-spacing:-1px; margin-bottom:8px; }
  .login-logo span { color:var(--accent); }
  .login-sub { color:var(--text2); font-size:13px; margin-bottom:32px; }
  .login-label { font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text2); margin-bottom:6px; display:block; }
  .login-input {
    width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:12px 14px;
    color:var(--text); font-family:'Syne',sans-serif; font-size:15px; outline:none; margin-bottom:16px;
    transition:border-color .2s;
  }
  .login-input:focus { border-color:var(--accent); }
  .login-btn {
    width:100%; background:var(--accent); color:#000; border:none; border-radius:8px; padding:13px;
    font-family:'Syne',sans-serif; font-size:15px; font-weight:700; cursor:pointer; transition:opacity .2s;
    letter-spacing:.5px;
  }
  .login-btn:hover { opacity:.88; }
  .login-error { color:var(--danger); font-size:13px; margin-top:10px; text-align:center; display:none; }
  .login-hint { color:var(--text3); font-size:11px; text-align:center; margin-top:14px; }

  /* APP SHELL */
  #app { display:none; }
  .topbar {
    background:var(--surface); border-bottom:1px solid var(--border); padding:0 28px; height:60px;
    display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
  }
  .topbar-brand { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .topbar-brand span { color:var(--accent); }
  .topbar-right { display:flex; align-items:center; gap:14px; }
  .topbar-user { font-size:13px; color:var(--text2); }
  .logout-btn {
    background:transparent; border:1px solid var(--border); color:var(--text2); border-radius:6px;
    padding:6px 14px; font-family:'Syne',sans-serif; font-size:12px; cursor:pointer; transition:all .2s;
  }
  .logout-btn:hover { border-color:var(--danger); color:var(--danger); }

  /* TABS */
  .tabs { display:flex; gap:2px; padding:16px 28px 0; background:var(--surface); border-bottom:1px solid var(--border); }
  .tab {
    padding:10px 22px; font-size:13px; font-weight:600; cursor:pointer; border-radius:8px 8px 0 0;
    color:var(--text2); transition:all .15s; letter-spacing:.3px;
  }
  .tab.active { background:var(--bg); color:var(--accent); border:1px solid var(--border); border-bottom:1px solid var(--bg); }
  .tab:hover:not(.active) { color:var(--text); }

  /* MAIN */
  .main { padding:28px; max-width:1400px; }

  /* CARDS */
  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
  .kpi-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 22px;
  }
  .kpi-label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--text2); margin-bottom:6px; }
  .kpi-val { font-size:28px; font-weight:800; line-height:1.1; }
  .kpi-sub { font-size:11px; color:var(--text2); margin-top:4px; }
  .kpi-accent { color:var(--accent); }
  .kpi-warn { color:var(--warn); }
  .kpi-danger { color:var(--danger); }

  /* SECTION */
  .section { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; }
  .section-head {
    padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between;
  }
  .section-title { font-size:15px; font-weight:700; }
  .section-body { padding:22px; }

  /* TABLE */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text2); padding:10px 12px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:10px 12px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }

  .badge {
    display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:700; letter-spacing:.5px;
  }
  .badge-green { background:rgba(0,229,160,.15); color:var(--accent); }
  .badge-yellow { background:rgba(255,184,0,.15); color:var(--warn); }
  .badge-red { background:rgba(255,59,59,.15); color:var(--danger); }
  .badge-blue { background:rgba(108,99,255,.15); color:var(--accent3); }

  /* FOLLOW-UP BOX */
  .followup-box {
    background:rgba(255,107,53,.08); border:1px solid rgba(255,107,53,.25); border-radius:10px; padding:14px 18px; margin-top:10px;
  }
  .followup-box h4 { font-size:13px; font-weight:700; color:var(--accent2); margin-bottom:8px; }
  .followup-box p { font-size:12px; color:var(--text2); line-height:1.6; }
  .followup-box ul { font-size:12px; color:var(--text2); line-height:1.8; padding-left:18px; }
  .followup-action {
    display:inline-block; background:var(--accent2); color:#fff; border-radius:6px; padding:5px 12px;
    font-size:11px; font-weight:700; margin-top:8px; cursor:pointer; border:none; font-family:'Syne',sans-serif;
    letter-spacing:.5px;
  }

  /* FILTERS */
  .filter-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; margin-bottom:20px; }
  select, input[type=text], input[type=number], input[type=date], textarea {
    background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:9px 13px;
    color:var(--text); font-family:'Syne',sans-serif; font-size:13px; outline:none; transition:border .2s;
  }
  select:focus, input:focus, textarea:focus { border-color:var(--accent); }
  select { cursor:pointer; }
  label { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--text2); display:block; margin-bottom:4px; }
  .btn {
    padding:9px 20px; border-radius:8px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; letter-spacing:.3px; transition:all .15s; border:none;
  }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-primary:hover { opacity:.88; }
  .btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger { background:var(--danger); color:#fff; }
  .btn-warn { background:var(--warn); color:#000; }

  /* CHART BARS */
  .mini-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .mini-bar-fill { height:100%; border-radius:3px; transition:width .4s; }

  /* FORM */
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group.full { grid-column:1/-1; }
  textarea { resize:vertical; min-height:80px; font-size:13px; }

  /* INSIGHTS */
  .insight-card {
    background:var(--surface2); border-radius:10px; padding:16px 18px; margin-bottom:12px; border-left:3px solid var(--accent);
  }
  .insight-card.warn { border-left-color:var(--warn); }
  .insight-card.danger { border-left-color:var(--danger); }
  .insight-title { font-size:13px; font-weight:700; margin-bottom:4px; }
  .insight-body { font-size:12px; color:var(--text2); line-height:1.6; }

  /* PRINT */
  @media print {
    .topbar, .tabs, .no-print { display:none !important; }
    body { background:#fff; color:#000; }
    .section { border:1px solid #ccc; }
    .kpi-card { border:1px solid #ccc; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  .empty-state { text-align:center; padding:40px; color:var(--text2); font-size:14px; }

  /* Tooltip */
  [data-tip] { position:relative; cursor:help; }
  [data-tip]:hover::after {
    content:attr(data-tip); position:absolute; bottom:120%; left:50%; transform:translateX(-50%);
    background:#1a1f2b; border:1px solid var(--border); color:var(--text); font-size:11px; padding:6px 10px;
    border-radius:6px; white-space:nowrap; z-index:99; pointer-events:none;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Call<span>Pulse</span></div>
    <p class="login-sub">Productivity Dashboard · Secure Access</p>
    <label class="login-label">Username</label>
    <input class="login-input" id="loginUser" type="text" placeholder="Enter username" autocomplete="username"/>
    <label class="login-label">Password</label>
    <input class="login-input" id="loginPass" type="password" placeholder="Enter password" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="loginError">Invalid credentials. Try again.</div>
    <p class="login-hint">Default: admin / admin123 · manager / manager1</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Call<span>Pulse</span></div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbarUser"></span>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="tabs">

    <div class="tab" onclick="showTab('metrics')">📥 Enter Metrics</div>
    <div class="tab" onclick="showTab('followups')">🔔 Follow-Ups</div>
    <div class="tab" onclick="showTab('report')">🖨 Reports</div>
  </div>

  <div class="main" id="mainContent"></div>
</div>

// ============================================================
// DATA HELPERS
// ============================================================
function cycleLabel(c) {
  const s = String(c);
  const months = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(s.slice(4))] + ' ' + s.slice(2,4);
}

function getMetric(data, agent, cycle, type) {
  const r = data.find(d => d.Agent === agent && d.Cycle === cycle && d.Type === type);
  return r ? r.Actual : 0;
}

function buildPivot(cycles) {
  const agents = [...new Set(RAW_DATA.map(d => d.Agent))].sort();
  return agents.map(ag => {
    let totalAttempts=0, totalConnects=0, totalSC=0, totalPay=0;
    cycles.forEach(cy => {
      totalAttempts += getMetric(RAW_DATA, ag, cy, 'Call attempts');
      totalConnects += getMetric(RAW_DATA, ag, cy, 'Connects');
      totalSC += getMetric(RAW_DATA, ag, cy, 'Successful Connects');
      totalPay += getMetric(RAW_DATA, ag, cy, 'Payments');
    });
    const connectRate = totalAttempts > 0 ? (totalConnects/totalAttempts*100).toFixed(1) : 0;
    const connectQuality = totalConnects > 0 ? (totalSC/totalConnects*100).toFixed(1) : 0;
    const payRate = totalSC > 0 ? (totalPay/totalSC*100).toFixed(1) : 0;
    return { agent: ag, attempts: totalAttempts, connects: totalConnects, sc: totalSC, pay: totalPay, connectRate, connectQuality, payRate };
  }).filter(r => r.attempts > 0);
}

function janMayCycles() { return [202601,202602,202603,202604,202605]; }
function allCycles() { return [...new Set(RAW_DATA.map(d => d.Cycle))].sort(); }

function getRateStatus(val) {
  if (val >= 25) return 'green';
  if (val >= 18) return 'yellow';
  return 'red';
}
function getQualityStatus(val) {
  if (val >= 70) return 'green';
  if (val >= 55) return 'yellow';
  return 'red';
}
function getPayStatus(val) {
  if (val >= 55) return 'green';
  if (val >= 40) return 'yellow';
  return 'red';
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['dashboard','agents','metrics','followups','report'];
    t.classList.toggle('active', names[i] === tab);
  });
  const mc = document.getElementById('mainContent');
  if (tab === 'dashboard') mc.innerHTML = renderDashboard();
  else if (tab === 'agents') mc.innerHTML = renderAgents();
  else if (tab === 'metrics') mc.innerHTML = renderMetrics();
  else if (tab === 'followups') mc.innerHTML = renderFollowUps();
  else if (tab === 'report') mc.innerHTML = renderReport();
}

// DASHBOARD
// ============================================================
function renderDashboard() {
  const cycles = janMayCycles();
  const pivot = buildPivot(cycles);

  const totalAttempts = pivot.reduce((s,r) => s+r.attempts, 0);
  const totalConnects = pivot.reduce((s,r) => s+r.connects, 0);
  const totalSC = pivot.reduce((s,r) => s+r.sc, 0);
  const totalPay = pivot.reduce((s,r) => s+r.pay, 0);
  const avgConnRate = totalAttempts > 0 ? (totalConnects/totalAttempts*100).toFixed(1) : 0;
  const avgQuality = totalConnects > 0 ? (totalSC/totalConnects*100).toFixed(1) : 0;
  const avgPayRate = totalSC > 0 ? (totalPay/totalSC*100).toFixed(1) : 0;

  // Low performers
  const lowConnect = pivot.filter(r => r.connectRate < 18 && r.attempts > 1000).slice(0,5);
  const lowQuality = pivot.filter(r => r.connectQuality < 55 && r.connects > 500).slice(0,5);

  // Monthly trend
  const monthData = cycles.map(cy => {
    const att = RAW_DATA.filter(d => d.Cycle === cy && d.Type === 'Call attempts').reduce((s,d) => s+d.Actual,0);
    const conn = RAW_DATA.filter(d => d.Cycle === cy && d.Type === 'Connects').reduce((s,d) => s+d.Actual,0);
    const sc = RAW_DATA.filter(d => d.Cycle === cy && d.Type === 'Successful Connects').reduce((s,d) => s+d.Actual,0);
    const pay = RAW_DATA.filter(d => d.Cycle === cy && d.Type === 'Payments').reduce((s,d) => s+d.Actual,0);
    return { cy, att, conn, sc, pay, cr: att>0?(conn/att*100).toFixed(1):0, cq: conn>0?(sc/conn*100).toFixed(1):0, pr: sc>0?(pay/sc*100).toFixed(1):0 };
  });

  const activeAgents = pivot.filter(r => r.attempts > 500).length;

  return `
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Call Attempts</div>
      <div class="kpi-val">${totalAttempts.toLocaleString()}</div>
      <div class="kpi-sub">Jan–May 2026</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Connect Rate</div>
      <div class="kpi-val kpi-${getRateStatus(avgConnRate)}">${avgConnRate}%</div>
      <div class="kpi-sub">Connects / Call Attempts</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Connect Quality</div>
      <div class="kpi-val kpi-${getQualityStatus(avgQuality)}">${avgQuality}%</div>
      <div class="kpi-sub">Successful Connects / Connects</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Payment Rate</div>
      <div class="kpi-val kpi-${getPayStatus(avgPayRate)}">${avgPayRate}%</div>
      <div class="kpi-sub">Payments / Successful Connects</div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
    <div class="kpi-card"><div class="kpi-label">Total Connects</div><div class="kpi-val kpi-accent">${totalConnects.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">Successful Connects</div><div class="kpi-val kpi-accent">${totalSC.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">Total Payments</div><div class="kpi-val kpi-accent">${totalPay.toLocaleString()}</div></div>
    <div class="kpi-card"><div class="kpi-label">Active Agents</div><div class="kpi-val">${activeAgents}</div></div>
  </div>

  <div class="section" style="margin-bottom:20px;">
    <div class="section-head"><span class="section-title">📅 Monthly Trend — Jan to May 2026</span></div>
    <div class="section-body" style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th>Month</th><th>Call Attempts</th><th>Connects</th>
          <th>Connect Rate</th><th>Succ. Connects</th><th>Connect Quality</th>
          <th>Payments</th><th>Pay Rate</th>
        </tr></thead>
        <tbody>
          ${monthData.map(m => `
          <tr>
            <td><b>${cycleLabel(m.cy)}</b></td>
            <td>${m.att.toLocaleString()}</td>
            <td>${m.conn.toLocaleString()}</td>
            <td><span class="badge badge-${getRateStatus(m.cr)}">${m.cr}%</span></td>
            <td>${m.sc.toLocaleString()}</td>
            <td><span class="badge badge-${getQualityStatus(m.cq)}">${m.cq}%</span></td>
            <td>${m.pay.toLocaleString()}</td>
            <td><span class="badge badge-${getPayStatus(m.pr)}">${m.pr}%</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div class="section">
      <div class="section-head"><span class="section-title">⚠️ Low Connect Rate Agents</span></div>
      <div class="section-body">
        ${lowConnect.length === 0 ? '<div class="empty-state">All agents within range</div>' : lowConnect.map(r => `
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:13px;font-weight:600;">${r.agent}</span>
            <span class="badge badge-red">${r.connectRate}%</span>
          </div>
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(r.connectRate*2,100)}%;background:var(--danger);"></div></div>
        </div>`).join('')}
        ${lowConnect.length > 0 ? '<div class="followup-box"><h4>📞 Action: Follow up with Data Team</h4><p>Check if calls are going through — verify network routes, number validity, and dialler settings for flagged agents.</p></div>' : ''}
      </div>
    </div>
    <div class="section">
      <div class="section-head"><span class="section-title">⚠️ Low Connect Quality Agents</span></div>
      <div class="section-body">
        ${lowQuality.length === 0 ? '<div class="empty-state">All agents within range</div>' : lowQuality.map(r => `
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:13px;font-weight:600;">${r.agent}</span>
            <span class="badge badge-red">${r.connectQuality}%</span>
          </div>
          <div class="mini-bar"><div class="mini-bar-fill" style="width:${Math.min(r.connectQuality,100)}%;background:var(--warn);"></div></div>
        </div>`).join('')}
        ${lowQuality.length > 0 ? '<div class="followup-box"><h4>🎯 Action: Quality Review</h4><p>Low successful connect rate suggests pitch or call handling issues. Review call recordings & provide coaching.</p></div>' : ''}
      </div>
    </div>
  </div>`;
}

  </div>

  <div id="addAgentForm" style="display:none;" class="section" style="margin-bottom:16px;">
    <div class="section-head"><span class="section-title">➕ Add New Agent to Team</span></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group"><label>Full Name</label><input type="text" id="newAgentName" placeholder="e.g. Jane Doe"></div>
        <div class="form-group"><label>Join Date</label><input type="date" id="newAgentDate"></div>
        <div class="form-group"><label>Team / Role</label><input type="text" id="newAgentRole" placeholder="e.g. Collections Agent"></div>
        <div class="form-group"><label>Notes</label><input type="text" id="newAgentNotes" placeholder="Any notes..."></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="addAgent()">Save Agent</button>
        <button class="btn btn-secondary" onclick="document.getElementById('addAgentForm').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  ${agentList.length > 0 ? `
  <div class="section" style="margin-bottom:16px;">
    <div class="section-head"><span class="section-title">👤 Custom Agent Registry (${agentList.length})</span></div>
    <div class="section-body" style="overflow-x:auto;">
      <table>
        <thead><tr><th>Name</th><th>Join Date</th><th>Role</th><th>Notes</th><th>Action</th></tr></thead>
        <tbody>
          ${agentList.map((a,i) => `
          <tr>
            <td><b>${a.name}</b></td>
            <td>${a.date}</td>
            <td>${a.role}</td>
            <td>${a.notes}</td>
            <td><button class="btn btn-danger" style="padding:4px 10px;font-size:11px;" onclick="removeAgent(${i})">Remove</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>` : ''}

  <div class="section">
    <div class="section-head">
      <span class="section-title">Agent Performance — ${filterCycle ? cycleLabel(parseInt(filterCycle)) : 'Jan–May 2026'} (${displayPivot.length} agents)</span>
    </div>
    <div class="section-body" style="overflow-x:auto;">
      <table>
        <thead><tr>
          <th>#</th><th>Agent</th><th>Call Attempts</th><th>Connects</th>
          <th data-tip="Connects / Call Attempts">Connect Rate ℹ</th>
          <th>Succ. Connects</th>
          <th data-tip="Successful Connects / Connects">Connect Quality ℹ</th>
          <th>Payments</th>
          <th data-tip="Payments / Successful Connects">Pay Rate ℹ</th>
          <th>Follow-Up</th>
        </tr></thead>
        <tbody>
          ${displayPivot.map((r,i) => {
            const crStatus = getRateStatus(r.connectRate);
            const cqStatus = getQualityStatus(r.connectQuality);
            const prStatus = getPayStatus(r.payRate);
            const needsFollowup = crStatus === 'red' || cqStatus === 'red';
            return `
            <tr>
              <td style="color:var(--text2)">${i+1}</td>
              <td><b>${r.agent}</b></td>
              <td>${r.attempts.toLocaleString()}</td>
              <td>${r.connects.toLocaleString()}</td>
              <td><span class="badge badge-${crStatus}">${r.connectRate}%</span></td>
              <td>${r.sc.toLocaleString()}</td>
              <td><span class="badge badge-${cqStatus}">${r.connectQuality}%</span></td>
              <td>${r.pay.toLocaleString()}</td>
              <td><span class="badge badge-${prStatus}">${r.payRate}%</span></td>
              <td>${needsFollowup ? `<button class="btn btn-warn" style="padding:4px 10px;font-size:11px;" onclick="createFollowUp('${r.agent.replace(/'/g,"\\'")}','${crStatus==='red'?'Connect Rate':'Connect Quality'}')">Flag</button>` : '<span style="color:var(--text3)">—</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function reloadAgents() { document.getElementById('mainContent').innerHTML = renderAgents(); }

function showAddAgent() {
  const f = document.getElementById('addAgentForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function addAgent() {
  const name = document.getElementById('newAgentName').value.trim();
  if (!name) return alert('Please enter agent name');
  agentList.push({ name, date: document.getElementById('newAgentDate').value, role: document.getElementById('newAgentRole').value, notes: document.getElementById('newAgentNotes').value });
  save();
  showTab('agents');
}

function removeAgent(i) {
  if (confirm('Remove this agent?')) { agentList.splice(i,1); save(); showTab('agents'); }
}

// ============================================================
// METRICS ENTRY
// ============================================================
function renderMetrics() {
  const agents = [...new Set(RAW_DATA.map(d => d.Agent))].sort();
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="section">
      <div class="section-head"><span class="section-title">📥 Enter New Metric</span></div>
      <div class="section-body">
        <div class="form-grid">
          <div class="form-group">
            <label>Agent</label>
            <select id="mAgent">
              <option value="">-- Select Agent --</option>
              ${agents.map(a => `<option>${a}</option>`).join('')}
              ${agentList.map(a => `<option>${a.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label>Cycle (YYYYMM)</label>
            <input type="text" id="mCycle" placeholder="e.g. 202606" maxlength="6">
          </div>
          <div class="form-group">
            <label>Metric Type</label>
            <select id="mType">
              <option>Call attempts</option>
              <option>Connects</option>
              <option>Successful Connects</option>
              <option>Payments</option>
            </select>
          </div>
          <div class="form-group">
            <label>Value</label>
            <input type="number" id="mValue" placeholder="e.g. 1250" min="0">
          </div>
          <div class="form-group full">
            <label>Notes (optional)</label>
            <textarea id="mNotes" placeholder="Any notes about this entry..."></textarea>
          </div>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;">
          <button class="btn btn-primary" onclick="saveMetric()">Save Metric</button>
          <button class="btn btn-secondary" onclick="clearMetricForm()">Clear</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">
        <span class="section-title">📋 Saved Entries (${customMetrics.length})</span>
        ${customMetrics.length > 0 ? `<button class="btn btn-danger no-print" onclick="clearAllMetrics()" style="padding:6px 14px;font-size:12px;">Clear All</button>` : ''}
      </div>
      <div class="section-body" style="max-height:400px;overflow-y:auto;">
        ${customMetrics.length === 0 ? '<div class="empty-state">No custom metrics yet</div>' : `
        <table>
          <thead><tr><th>Agent</th><th>Cycle</th><th>Type</th><th>Value</th><th>Notes</th><th></th></tr></thead>
          <tbody>
            ${customMetrics.map((m,i) => `
            <tr>
              <td>${m.agent}</td>
              <td>${cycleLabel(parseInt(m.cycle))}</td>
              <td>${m.type}</td>
              <td><b>${parseInt(m.value).toLocaleString()}</b></td>
              <td style="color:var(--text2);font-size:11px;">${m.notes||'—'}</td>
              <td><button onclick="removeMetric(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;">✕</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    </div>
  </div>`;
}

function saveMetric() {
  const agent = document.getElementById('mAgent').value;
  const cycle = document.getElementById('mCycle').value.trim();
  const type = document.getElementById('mType').value;
  const value = document.getElementById('mValue').value;
  if (!agent || !cycle || !value) return alert('Please fill Agent, Cycle, and Value');
  if (!/^\d{6}$/.test(cycle)) return alert('Cycle must be 6 digits e.g. 202606');
  customMetrics.push({ agent, cycle, type, value, notes: document.getElementById('mNotes').value, date: new Date().toISOString() });
  save();
  showTab('metrics');
}

function removeMetric(i) { customMetrics.splice(i,1); save(); showTab('metrics'); }
function clearAllMetrics() { if (confirm('Clear all saved metrics?')) { customMetrics=[]; save(); showTab('metrics'); } }
function clearMetricForm() { ['mAgent','mCycle','mValue','mNotes'].forEach(id => document.getElementById(id).value=''); }

// ============================================================
// FOLLOW-UPS
// ============================================================
function createFollowUp(agent, issue) {
  const followUpData = {
    agent,
    issue,
    team: issue.includes('Connect Rate') ? 'Data Team' : 'Quality Team',
    questions: issue.includes('Connect Rate')
      ? ['Are calls going through on the network?', 'Are numbers in the dialler valid?', 'Any routing issues on this agent\'s queue?', 'Has there been SIM/network downtime?']
      : ['Review last 10 call recordings', 'Is the agent following the script?', 'Check average call duration', 'Identify objection handling gaps'],
    status: 'Open',
    created: new Date().toLocaleDateString(),
    note: ''
  };
  followUps.push(followUpData);
  save();
  showTab('followups');
}

function renderFollowUps() {
  const openCount = followUps.filter(f => f.status === 'Open').length;
  return `
  <div class="filter-row no-print">
    <div style="margin-top:18px;">
      <button class="btn btn-primary" onclick="showManualFollowUp()">+ Add Manual Follow-Up</button>
    </div>
  </div>

  <div id="manualFollowUpForm" style="display:none;" class="section" style="margin-bottom:16px;">
    <div class="section-head"><span class="section-title">➕ Manual Follow-Up</span></div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group"><label>Agent</label><input type="text" id="fuAgent" placeholder="Agent name"></div>
        <div class="form-group"><label>Issue</label><input type="text" id="fuIssue" placeholder="e.g. Low payment rate"></div>
        <div class="form-group"><label>Team to Contact</label><input type="text" id="fuTeam" placeholder="e.g. QA Team"></div>
        <div class="form-group"><label>Status</label>
          <select id="fuStatus"><option>Open</option><option>In Progress</option><option>Resolved</option></select>
        </div>
        <div class="form-group full"><label>Notes / Questions</label><textarea id="fuNote" placeholder="What to check or ask..."></textarea></div>
      </div>
      <div style="margin-top:14px;display:flex;gap:10px;">
        <button class="btn btn-primary" onclick="saveManualFollowUp()">Save</button>
        <button class="btn btn-secondary" onclick="document.getElementById('manualFollowUpForm').style.display='none'">Cancel</button>
      </div>
    </div>
  </div>

  <div class="kpi-grid" style="margin-bottom:20px;">
    <div class="kpi-card"><div class="kpi-label">Total Follow-Ups</div><div class="kpi-val">${followUps.length}</div></div>
    <div class="kpi-card"><div class="kpi-label">Open</div><div class="kpi-val kpi-danger">${openCount}</div></div>
    <div class="kpi-card"><div class="kpi-label">In Progress</div><div class="kpi-val kpi-warn">${followUps.filter(f=>f.status==='In Progress').length}</div></div>
    <div class="kpi-card"><div class="kpi-label">Resolved</div><div class="kpi-val kpi-accent">${followUps.filter(f=>f.status==='Resolved').length}</div></div>
  </div>

  ${followUps.length === 0 ? `
  <div class="section"><div class="section-body"><div class="empty-state">
    No follow-ups yet. Flag agents from the Agents tab or add manually above.
  </div></div></div>` : followUps.map((f,i) => `
  <div class="section" style="margin-bottom:14px;">
    <div class="section-head">
      <span class="section-title">
        <span class="badge ${f.status==='Resolved'?'badge-green':f.status==='In Progress'?'badge-yellow':'badge-red'}" style="margin-right:8px;">${f.status}</span>
        ${f.agent} — ${f.issue}
      </span>
      <div style="display:flex;gap:8px;">
        <select onchange="updateFollowUpStatus(${i},this.value)" style="font-size:12px;padding:5px 8px;">
          <option ${f.status==='Open'?'selected':''}>Open</option>
          <option ${f.status==='In Progress'?'selected':''}>In Progress</option>
          <option ${f.status==='Resolved'?'selected':''}>Resolved</option>
        </select>
        <button onclick="removeFollowUp(${i})" class="btn btn-secondary" style="padding:5px 10px;font-size:11px;">Remove</button>
      </div>
    </div>
    <div class="section-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">📅 Created: <b>${f.created}</b> &nbsp; 👥 Contact: <b style="color:var(--accent2)">${f.team}</b></div>
          ${f.questions && f.questions.length > 0 ? `
          <div class="followup-box">
            <h4>❓ Questions / Actions</h4>
            <ul>${f.questions.map(q => `<li>${q}</li>`).join('')}</ul>
          </div>` : ''}
          ${f.note ? `<div style="margin-top:8px;font-size:12px;color:var(--text2);"><b>Notes:</b> ${f.note}</div>` : ''}
        </div>
        <div>
          <label style="margin-bottom:6px;display:block;">Update Notes</label>
          <textarea placeholder="Add update notes..." onblur="updateFollowUpNote(${i},this.value)" style="width:100%;min-height:80px;font-size:12px;">${f.note||''}</textarea>
        </div>
      </div>
    </div>
  </div>`).join('')}`;
}

function showManualFollowUp() {
  const f = document.getElementById('manualFollowUpForm');
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
}
function saveManualFollowUp() {
  const agent = document.getElementById('fuAgent').value.trim();
  if (!agent) return alert('Enter agent name');
  followUps.push({ agent, issue: document.getElementById('fuIssue').value, team: document.getElementById('fuTeam').value, status: document.getElementById('fuStatus').value, created: new Date().toLocaleDateString(), note: document.getElementById('fuNote').value, questions: [] });
  save();
  showTab('followups');
}
function updateFollowUpStatus(i, val) { followUps[i].status = val; save(); }
function updateFollowUpNote(i, val) { followUps[i].note = val; save(); }
function removeFollowUp(i) { if (confirm('Remove follow-up?')) { followUps.splice(i,1); save(); showTab('followups'); } }

// ============================================================
// REPORT
// ============================================================
function renderReport() {
  const cycles = janMayCycles();
  const pivot = buildPivot(cycles).filter(r => r.attempts > 500);

  const totalAttempts = pivot.reduce((s,r) => s+r.attempts, 0);
  const totalConnects = pivot.reduce((s,r) => s+r.connects, 0);
  const totalSC = pivot.reduce((s,r) => s+r.sc, 0);
  const totalPay = pivot.reduce((s,r) => s+r.pay, 0);
  const avgCR = (totalConnects/totalAttempts*100).toFixed(1);
  const avgCQ = (totalSC/totalConnects*100).toFixed(1);
  const avgPR = (totalPay/totalSC*100).toFixed(1);

  const monthData = cycles.map(cy => {
    const att = RAW_DATA.filter(d => d.Cycle===cy && d.Type==='Call attempts').reduce((s,d)=>s+d.Actual,0);
    const conn = RAW_DATA.filter(d => d.Cycle===cy && d.Type==='Connects').reduce((s,d)=>s+d.Actual,0);
    const sc = RAW_DATA.filter(d => d.Cycle===cy && d.Type==='Successful Connects').reduce((s,d)=>s+d.Actual,0);
    const pay = RAW_DATA.filter(d => d.Cycle===cy && d.Type==='Payments').reduce((s,d)=>s+d.Actual,0);
    return { cy, att, conn, sc, pay, cr: att>0?(conn/att*100).toFixed(1):0, cq: conn>0?(sc/conn*100).toFixed(1):0, pr: sc>0?(pay/sc*100).toFixed(1):0 };
  });

  const topAgents = [...pivot].sort((a,b) => b.pay-a.pay).slice(0,10);
  const lowPerf = pivot.filter(r => parseFloat(r.connectRate) < 20).slice(0,10);

  return `
  <div class="no-print filter-row" style="margin-bottom:20px;">
    <button class="btn btn-primary" onclick="window.print()">🖨 Print Report</button>
    <button class="btn btn-secondary" onclick="exportCSV()">⬇ Export CSV</button>
  </div>

  <div style="border:1px solid var(--border);border-radius:12px;padding:32px;background:var(--surface);">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:24px;font-weight:800;letter-spacing:-1px;">Call Centre Productivity Report</h1>
      <p style="color:var(--text2);margin-top:4px;">Period: January — May 2026 &nbsp;|&nbsp; Generated: ${new Date().toLocaleDateString()}</p>
    </div>

    <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px;">Executive Summary</h2>
    <div class="kpi-grid" style="margin-bottom:24px;">
      <div class="kpi-card"><div class="kpi-label">Total Attempts</div><div class="kpi-val">${totalAttempts.toLocaleString()}</div></div>
      <div class="kpi-card"><div class="kpi-label">Connect Rate</div><div class="kpi-val kpi-${getRateStatus(avgCR)}">${avgCR}%</div></div>
      <div class="kpi-card"><div class="kpi-label">Connect Quality</div><div class="kpi-val kpi-${getQualityStatus(avgCQ)}">${avgCQ}%</div></div>
      <div class="kpi-card"><div class="kpi-label">Payment Rate</div><div class="kpi-val kpi-${getPayStatus(avgPR)}">${avgPR}%</div></div>
    </div>

    <h2 style="font-size:16px;font-weight:700;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;">Monthly Breakdown</h2>
    <table style="margin-bottom:24px;">
      <thead><tr><th>Month</th><th>Attempts</th><th>Connects</th><th>Connect Rate</th><th>Succ. Connects</th><th>Quality</th><th>Payments</th><th>Pay Rate</th></tr></thead>
      <tbody>
        ${monthData.map(m => `<tr>
          <td><b>${cycleLabel(m.cy)}</b></td>
          <td>${m.att.toLocaleString()}</td><td>${m.conn.toLocaleString()}</td>
          <td><span class="badge badge-${getRateStatus(m.cr)}">${m.cr}%</span></td>
          <td>${m.sc.toLocaleString()}</td>
          <td><span class="badge badge-${getQualityStatus(m.cq)}">${m.cq}%</span></td>
          <td>${m.pay.toLocaleString()}</td>
          <td><span class="badge badge-${getPayStatus(m.pr)}">${m.pr}%</span></td>
        </tr>`).join('')}
      </tbody>
    </table>

    <h2 style="font-size:16px;font-weight:700;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;">Top 10 Agents by Payments</h2>
    <table style="margin-bottom:24px;">
      <thead><tr><th>#</th><th>Agent</th><th>Attempts</th><th>Connects</th><th>Connect Rate</th><th>Succ. Connects</th><th>Quality</th><th>Payments</th><th>Pay Rate</th></tr></thead>
      <tbody>
        ${topAgents.map((r,i) => `<tr>
          <td>${i+1}</td><td><b>${r.agent}</b></td>
          <td>${r.attempts.toLocaleString()}</td><td>${r.connects.toLocaleString()}</td>
          <td><span class="badge badge-${getRateStatus(r.connectRate)}">${r.connectRate}%</span></td>
          <td>${r.sc.toLocaleString()}</td>
          <td><span class="badge badge-${getQualityStatus(r.connectQuality)}">${r.connectQuality}%</span></td>
          <td><b>${r.pay.toLocaleString()}</b></td>
          <td><span class="badge badge-${getPayStatus(r.payRate)}">${r.payRate}%</span></td>
        </tr>`).join('')}
      </tbody>
    </table>

    ${lowPerf.length > 0 ? `
    <h2 style="font-size:16px;font-weight:700;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;">⚠️ Agents Requiring Attention (Connect Rate < 20%)</h2>
    <table style="margin-bottom:24px;">
      <thead><tr><th>Agent</th><th>Attempts</th><th>Connects</th><th>Connect Rate</th><th>Recommended Action</th></tr></thead>
      <tbody>
        ${lowPerf.map(r => `<tr>
          <td><b>${r.agent}</b></td>
          <td>${r.attempts.toLocaleString()}</td><td>${r.connects.toLocaleString()}</td>
          <td><span class="badge badge-red">${r.connectRate}%</span></td>
          <td style="font-size:11px;color:var(--text2);">Follow up with Data Team — verify call routing & number validity</td>
        </tr>`).join('')}
      </tbody>
    </table>` : ''}

    ${followUps.length > 0 ? `
    <h2 style="font-size:16px;font-weight:700;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:8px;">Open Follow-Ups (${followUps.filter(f=>f.status!=='Resolved').length})</h2>
    <table>
      <thead><tr><th>Agent</th><th>Issue</th><th>Team</th><th>Status</th><th>Created</th></tr></thead>
      <tbody>
        ${followUps.map(f => `<tr>
          <td>${f.agent}</td><td>${f.issue}</td><td>${f.team}</td>
          <td><span class="badge ${f.status==='Resolved'?'badge-green':f.status==='In Progress'?'badge-yellow':'badge-red'}">${f.status}</span></td>
          <td>${f.created}</td>
        </tr>`).join('')}
      </tbody>
    </table>` : ''}
  </div>`;
}

function exportCSV() {
  const cycles = janMayCycles();
  const pivot = buildPivot(cycles);
  const headers = ['Agent','Call Attempts','Connects','Connect Rate (%)','Successful Connects','Connect Quality (%)','Payments','Pay Rate (%)'];
  const rows = pivot.map(r => [r.agent, r.attempts, r.connects, r.connectRate, r.sc, r.connectQuality, r.pay, r.payRate]);
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'productivity_report.csv'; a.click();
}
